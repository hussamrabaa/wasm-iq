
<style>
  @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  .app { direction: rtl; min-height: 620px; background: #1a3a6b; padding: 24px 16px; font-family: 'Tajawal', sans-serif; }
  .card { background: #1e4a8a; border-radius: 22px; padding: 28px 24px; max-width: 560px; margin: 0 auto; border: 1px solid rgba(100,180,255,0.18); }

  .logo-wrap { text-align: center; margin-bottom: 14px; }
  .logo-img { width: 140px; height: 140px; object-fit: contain; border-radius: 18px; background: #fff; padding: 12px; display: block; margin: 0 auto; }

  .divider { height: 2px; background: linear-gradient(90deg,transparent,#29b6f6,transparent); border-radius: 2px; margin: 16px 0; }
  .section-title { font-size: 17px; font-weight: 700; color: #87ceeb; margin-bottom: 10px; text-align: center; }
  .section-desc { font-size: 13px; color: #b3d4f0; text-align: center; margin-bottom: 20px; line-height: 1.7; }

  .field-group { margin-bottom: 14px; }
  .field-group label { display: block; font-size: 13px; font-weight: 600; color: #87ceeb; margin-bottom: 6px; }
  .field-group input {
    width: 100%; padding: 12px 16px;
    background: #ffffff;
    border: 2px solid transparent;
    border-radius: 11px; font-size: 15px; font-family: 'Tajawal', sans-serif;
    direction: rtl; color: #1a3a6b; outline: none; transition: border-color 0.2s; font-weight: 500;
  }
  .field-group input::placeholder { color: #94aabf; }
  .field-group input:focus { border-color: #29b6f6; }

  .btn-sky {
    width: 100%; padding: 14px;
    background: linear-gradient(90deg,#0ea5e9,#38bdf8);
    color: #fff; border: none; border-radius: 12px;
    font-size: 17px; font-weight: 700; font-family: 'Tajawal', sans-serif;
    cursor: pointer; margin-top: 6px; transition: opacity 0.2s;
    box-shadow: 0 4px 18px rgba(14,165,233,0.35);
  }
  .btn-sky:hover { opacity: 0.9; }

  .q-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .q-num { font-size: 13px; color: #87ceeb; font-weight: 600; }
  .score-live { font-size: 13px; color: #38bdf8; font-weight: 700; }
  .progress-bar { height: 8px; background: rgba(255,255,255,0.12); border-radius: 6px; margin-bottom: 20px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg,#0ea5e9,#38bdf8); border-radius: 6px; transition: width 0.4s ease; }
  .q-text { font-size: 18px; font-weight: 700; color: #fff; margin-bottom: 22px; line-height: 1.65; text-align: center; }

  .options-grid { display: flex; flex-direction: column; gap: 10px; margin-bottom: 18px; }
  .opt-btn {
    padding: 14px 18px; background: rgba(255,255,255,0.08);
    border: 2px solid rgba(135,206,235,0.25); border-radius: 12px;
    font-size: 15px; font-family: 'Tajawal', sans-serif; color: #e0f0ff;
    cursor: pointer; text-align: right; transition: all 0.22s; direction: rtl; font-weight: 500; position: relative;
  }
  .opt-btn:hover { background: rgba(56,189,248,0.15); border-color: #38bdf8; }
  .opt-btn.selected {
    background: linear-gradient(90deg,#0ea5e9,#38bdf8) !important;
    border-color: #38bdf8 !important; color: #fff !important; font-weight: 700;
    box-shadow: 0 4px 16px rgba(14,165,233,0.4); transform: scale(1.01);
  }
  .opt-btn.selected::before { content: '✔'; position: absolute; left: 14px; top: 50%; transform: translateY(-50%); font-size: 15px; color: #fff; }

  .btn-next {
    width: 100%; padding: 13px;
    background: linear-gradient(90deg,#0ea5e9,#38bdf8);
    color: #fff; border: none; border-radius: 12px;
    font-size: 16px; font-weight: 700; font-family: 'Tajawal', sans-serif;
    cursor: pointer; transition: opacity 0.2s; box-shadow: 0 4px 14px rgba(14,165,233,0.3);
  }
  .btn-next:disabled { opacity: 0.3; cursor: not-allowed; box-shadow: none; }
  .btn-next:not(:disabled):hover { opacity: 0.9; }

  .result-icon { width: 80px; height: 80px; border-radius: 50%; margin: 0 auto 14px; display: flex; align-items: center; justify-content: center; font-size: 38px; background: rgba(56,189,248,0.18); }
  .result-title { font-size: 21px; font-weight: 900; color: #fff; text-align: center; margin-bottom: 6px; }
  .result-score { font-size: 40px; font-weight: 900; text-align: center; color: #38bdf8; margin-bottom: 4px; }
  .result-cat { font-size: 14px; text-align: center; color: #87ceeb; margin-bottom: 18px; font-weight: 600; }

  .courses-title { font-size: 15px; font-weight: 700; color: #87ceeb; margin-bottom: 12px; }
  .course-card {
    border: 1.5px solid rgba(135,206,235,0.25); border-radius: 14px;
    padding: 14px 16px; margin-bottom: 10px; background: rgba(255,255,255,0.07);
    cursor: pointer; transition: all 0.22s; text-decoration: none; display: block;
  }
  .course-card:hover { background: rgba(56,189,248,0.15); border-color: #38bdf8; transform: translateY(-1px); }
  .course-name { font-size: 15px; font-weight: 700; color: #fff; margin-bottom: 3px; }
  .course-desc { font-size: 13px; color: #87ceeb; }
  .course-arrow { float: left; font-size: 18px; color: #38bdf8; }

  .saved-badge { background: rgba(56,189,248,0.12); border: 1px solid rgba(56,189,248,0.35); border-radius: 10px; padding: 9px 14px; text-align: center; font-size: 13px; color: #7dd3fc; margin-top: 12px; font-weight: 600; }

  .wa-btn {
    width: 100%; padding: 14px;
    background: linear-gradient(90deg,#25d366,#20ba5a);
    color: #fff; border: none; border-radius: 12px;
    font-size: 17px; font-weight: 700; font-family: 'Tajawal', sans-serif;
    cursor: pointer; margin-top: 12px; text-align: center;
    text-decoration: none; display: block;
    box-shadow: 0 4px 18px rgba(37,211,102,0.35); transition: opacity 0.2s;
  }
  .wa-btn:hover { opacity: 0.9; }

  .btn-retry {
    width: 100%; padding: 13px;
    background: transparent;
    color: #87ceeb; border: 2px solid rgba(135,206,235,0.4); border-radius: 12px;
    font-size: 15px; font-weight: 700; font-family: 'Tajawal', sans-serif;
    cursor: pointer; margin-top: 10px; transition: all 0.2s;
  }
  .btn-retry:hover { background: rgba(135,206,235,0.1); border-color: #87ceeb; color: #fff; }

  .hidden { display: none; }
</style>

<div class="app" dir="rtl">

  <!-- HOME -->
  <div class="card" id="home-screen">
    <div class="logo-wrap">
      <img class="logo-img" src="/mnt/user-data/uploads/WhatsApp_Image_2026-04-29_at_1_00_52_PM.jpeg" alt="وسم المعرفة" onerror="this.style.display='none'" />
    </div>
    <div class="divider"></div>
    <div class="section-title">🧠 اختبار الذكاء والتوجيه المهني</div>
    <div class="section-desc">ادخل بياناتك وابدأ الاختبار، وبعدين نوصيك بأفضل الدورات اللي تناسبك!</div>
    <div class="field-group">
      <label>اسمك الكريم</label>
      <input type="text" id="inp-name" placeholder="مثال: عبدالله الزهراني" />
    </div>
    <div class="field-group">
      <label>رقم جوالك</label>
      <input type="tel" id="inp-phone" placeholder="05xxxxxxxx" />
    </div>
    <div class="field-group">
      <label>بريدك الإلكتروني</label>
      <input type="email" id="inp-email" placeholder="example@email.com" />
    </div>
    <button class="btn-sky" onclick="startQuiz()">ابدأ الاختبار ←</button>
  </div>

  <!-- QUIZ -->
  <div class="card hidden" id="quiz-screen">
    <div class="q-header">
      <div class="q-num" id="q-num-label">السؤال 1 من 10</div>
      <div class="score-live" id="score-live">✔ 0 إجابة صح</div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog" style="width:0%"></div></div>
    <div class="q-text" id="q-text"></div>
    <div class="options-grid" id="opts"></div>
    <button class="btn-next" id="next-btn" disabled onclick="nextQ()">التالي ←</button>
  </div>

  <!-- RESULT -->
  <div class="card hidden" id="result-screen">
    <div class="result-icon" id="res-icon">🏆</div>
    <div class="result-title" id="res-title"></div>
    <div class="result-score" id="res-score"></div>
    <div class="result-cat" id="res-cat"></div>
    <div class="divider"></div>
    <div class="courses-title">✨ أفضل 3 دورات مناسبة لك من وسم المعرفة:</div>
    <div id="courses-list"></div>
   <div class="saved-badge" id="save-badge" style="display:none"></div>
    <a id="wa-link" class="wa-btn" href="#" target="_blank">
      <span style="font-size:20px;vertical-align:middle;margin-left:6px;">💬</span>
      احصل على هدية
    </a>
    <button class="btn-retry" onclick="restartQuiz()">🔄 إعادة الاختبار</button>
  </div>

</div>

<script>
const questions = [
  { text: "لو عندك 5 تفاحات وأخذت 3، كم يتبقى معك؟", opts: ["٣","٢","٥","١"], correct: 1 },
  { text: "أي رقم يكمل المتسلسلة: 2، 4، 8، 16، ___؟", opts: ["٢٠","٢٤","٣٢","١٨"], correct: 2 },
  { text: "لو باعت شركة منتجًا بـ 100 ريال وفيه خصم 20%، كم السعر النهائي؟", opts: ["٨٠ ريال","٧٠ ريال","٩٠ ريال","٦٠ ريال"], correct: 0 },
  { text: "أي كلمة تختلف عن البقية؟", opts: ["تفاحة","موز","برتقال","جزرة"], correct: 3 },
  { text: "لو كان اليوم الثلاثاء، ايش يكون اليوم بعد يومين؟", opts: ["الأربعاء","الخميس","الجمعة","الإثنين"], correct: 1 },
  { text: "أي شكل له 4 أضلاع متساوية وزوايا قائمة؟", opts: ["مثلث","مستطيل","مربع","دائرة"], correct: 2 },
  { text: "لو سافر شخص 60 كيلو في الساعة، كم يقطع في 3 ساعات؟", opts: ["٢٠ كيلو","١٢٠ كيلو","١٨٠ كيلو","٩٠ كيلو"], correct: 2 },
  { text: "أي مثال يوضح التفكير الإبداعي؟", opts: ["حفظ القواعد وتطبيقها","تقليد ما يفعله الآخرون","إيجاد حل جديد لمشكلة قديمة","الالتزام بنفس الطريقة دائمًا"], correct: 2 },
  { text: "كم عدد الأرقام الزوجية بين 1 و 20؟", opts: ["٨","١٠","٩","١١"], correct: 1 },
  { text: "لو كان الذكاء الاصطناعي يتعلم من البيانات، ايش أهم شيء يحتاجه؟", opts: ["إنترنت قوي","بيانات ضخمة وجودة عالية","شاشة كبيرة","مكان واسع"], correct: 1 }
];

const courseData = {
  admin: [
    { name: "الاتصال الإداري الفعّال", desc: "تطوير مهارات التواصل في بيئة العمل", url: "https://wal.com.sa/courses/%d8%a7%d9%84%d8%a7%d8%aa%d8%b5%d8%a7%d9%84-%d8%a7%d9%84%d8%a7%d8%af%d8%a7%d8%b1%d9%8a-%d8%a7%d9%84%d9%81%d8%b9%d8%a7%d9%84-2/" },
    { name: "بكج الأعمال", desc: "باقة شاملة لتطوير مهارات الأعمال والإدارة", url: "https://wal.com.sa/courses/%d8%a8%d9%83%d8%ac-%d8%a7%d9%84%d8%a3%d8%b9%d9%85%d8%a7%d9%84/" },
    { name: "أساسيات السلامة والصحة المهنية OSHA", desc: "أسس بيئة عمل آمنة بمعايير دولية", url: "https://wal.com.sa/courses/%d8%a7%d8%b3%d8%a7%d8%b3%d9%8a%d8%a7%d8%aa-%d8%a7%d9%84%d8%b3%d9%84%d8%a7%d9%85%d8%a9-%d9%88%d8%a7%d9%84%d8%b5%d8%ad%d8%a9-%d8%a7%d9%84%d9%85%d9%87%d9%86%d9%8a%d8%a9-%d8%a8%d9%85%d8%b9%d8%a7%d9%8a/" }
  ],
  sales: [
    { name: "دورات المبيعات الاحترافية", desc: "استراتيجيات البيع وإغلاق الصفقات بفاعلية", url: "https://wal.com.sa/all-courses/" },
    { name: "خدمة العملاء المتميزة", desc: "بناء علاقات قوية مع العملاء وزيادة الولاء", url: "https://wal.com.sa/all-courses/" },
    { name: "بكج الأعمال", desc: "مهارات تجارية شاملة تشمل المبيعات والتسويق", url: "https://wal.com.sa/courses/%d8%a8%d9%83%d8%ac-%d8%a7%d9%84%d8%a3%d8%b9%d9%85%d8%a7%d9%84/" }
  ],
  it: [
    { name: "دورات تقنية المعلومات", desc: "أساسيات تقنية المعلومات والحوسبة", url: "https://wal.com.sa/all-courses/" },
    { name: "إنشاء منصات التعليم الإلكتروني", desc: "تصميم وبناء منصات تعليم رقمية احترافية", url: "https://wal.com.sa/lms-platforms/" },
    { name: "مهارات الحاسب الأساسية", desc: "برامج Office والمهارات الرقمية الضرورية", url: "https://wal.com.sa/all-courses/" }
  ],
  ai: [
    { name: "الذكاء الاصطناعي والتحول الرقمي", desc: "مفاهيم وتطبيقات الذكاء الاصطناعي في الأعمال", url: "https://wal.com.sa/all-courses/" },
    { name: "إنشاء منصات التعليم بالذكاء الاصطناعي", desc: "دمج تقنيات الذكاء الاصطناعي في التعليم", url: "https://wal.com.sa/lms-platforms/" },
    { name: "دورات تقنية المعلومات المتقدمة", desc: "تقنيات متقدمة لمحترفي القطاع التقني", url: "https://wal.com.sa/all-courses/" }
  ]
};

let currentQ = 0, score = 0, selected = null, userData = {};
const WA_NUMBER = '966533379327';

function show(id) {
  ['home-screen','quiz-screen','result-screen'].forEach(function(s){ document.getElementById(s).classList.add('hidden'); });
  document.getElementById(id).classList.remove('hidden');
}

function startQuiz() {
  const name = document.getElementById('inp-name').value.trim();
  const phone = document.getElementById('inp-phone').value.trim();
  const email = document.getElementById('inp-email').value.trim();
  if (!name || !phone || !email) { alert('من فضلك اكمل بياناتك كلها عشان نقدر نساعدك!'); return; }
  userData = { name, phone, email };
  currentQ = 0; score = 0;
  show('quiz-screen');
  showQ();
}

function showQ() {
  selected = null;
  const q = questions[currentQ];
  document.getElementById('q-num-label').textContent = 'السؤال ' + (currentQ + 1) + ' من 10';
  document.getElementById('q-text').textContent = q.text;
  document.getElementById('prog').style.width = (currentQ / 10 * 100) + '%';
  document.getElementById('next-btn').disabled = true;
  document.getElementById('score-live').textContent = '✔ ' + score + ' إجابة صح';
  const opts = document.getElementById('opts');
  opts.innerHTML = '';
  q.opts.forEach(function(o, i) {
    const b = document.createElement('button');
    b.className = 'opt-btn';
    b.textContent = o;
    b.onclick = function() { selectOpt(i, b); };
    opts.appendChild(b);
  });
}

function selectOpt(i, btn) {
  document.querySelectorAll('.opt-btn').forEach(function(b){ b.classList.remove('selected'); });
  btn.classList.add('selected');
  selected = i;
  document.getElementById('next-btn').disabled = false;
}

function nextQ() {
  if (selected === questions[currentQ].correct) score++;
  currentQ++;
  if (currentQ < questions.length) { showQ(); } else { showResult(); }
}

function showResult() {
  const pct = Math.round((score / 10) * 100);
  let cat, label, icon;
  if (pct <= 25) { cat = 'admin'; label = 'دورات إدارية'; icon = '📋'; }
  else if (pct <= 50) { cat = 'sales'; label = 'دورات المبيعات'; icon = '🤝'; }
  else if (pct <= 75) { cat = 'it'; label = 'دورات تقنية المعلومات'; icon = '💻'; }
  else { cat = 'ai'; label = 'دورات الذكاء الاصطناعي'; icon = '🤖'; }

  show('result-screen');
  document.getElementById('res-icon').textContent = icon;
  document.getElementById('res-title').textContent = 'أحسنت يا ' + userData.name + '! 🎉';
  document.getElementById('res-score').textContent = score + '/10  (' + pct + '%)';
  document.getElementById('res-cat').textContent = 'بناءً على نتيجتك، توصيتنا لك: ' + label;
  document.getElementById('save-badge').style.display = 'none';

  const cl = document.getElementById('courses-list');
  cl.innerHTML = '';
  courseData[cat].forEach(function(c) {
    const a = document.createElement('a');
    a.className = 'course-card'; a.href = c.url; a.target = '_blank';
    a.innerHTML = '<span class="course-arrow">←</span><div class="course-name">' + c.name + '</div><div class="course-desc">' + c.desc + '</div>';
    cl.appendChild(a);
  });

  const msg = encodeURIComponent('السلام عليكم! أنا ' + userData.name + '، أنهيت اختبار الذكاء في معهد وسم المعرفة وحصلت على ' + score + '/10 (' + pct + '%). مهتم بـ' + label + '. أبغى أعرف أكثر عن الهدية 🎁');
  document.getElementById('wa-link').href = 'https://wa.me/' + WA_NUMBER + '?text=' + msg;

  saveToSheets(userData.name, userData.phone, userData.email, score, pct, label);
}

async function saveToSheets(name, phone, email, score, pct, cat) {
  const SHEET_URL = 'https://script.google.com/macros/s/AKfycbyajj91rkHVvqmLxsUe65Yc2ZlLdSJuyqtDRMWn2yvb1LmQOF50M09heE2jdVwbJlAWvw/exec';
  try {
    await fetch(SHEET_URL, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name, phone, email, score, percentage: pct + '%', category: cat, date: new Date().toLocaleString('ar-SA') }) });
    document.getElementById('save-badge').style.display = 'block';
  } catch(e) {
    const b = document.getElementById('save-badge');
    b.style.display = 'block'; b.textContent = '⚠️ لم يتم حفظ البيانات — تحقق من إعداد Google Sheets'; b.style.color = '#fbbf24';
  }
}

function restartQuiz() {
  currentQ = 0; score = 0; selected = null; userData = {};
  document.getElementById('inp-name').value = '';
  document.getElementById('inp-phone').value = '';
  document.getElementById('inp-email').value = '';
  show('home-screen');
}
</script>
